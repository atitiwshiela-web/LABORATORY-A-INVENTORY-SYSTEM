<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICpEP.se - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="centered-layout">
    <div class="terminal-panel" style="width: 400px; text-align: center;">
        <div class="header-section" style="margin-bottom: 20px;">
            <h2 style="color: var(--neon-blue);">INVENTORY SYSTEM</h2>
            <h3 style="color: var(--caution-orange); font-size: 1rem;">LAB A</h3>
        </div>
        
        <form id="loginForm">
            <h2 style="color: var(--terminal-green); border-bottom: 1px solid var(--panel-border); padding-bottom: 10px; font-size: 1rem;">IDENTITY VERIFICATION</h2>
            <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="loginUser" placeholder="ENTER USERNAME" required>
                <input type="password" id="loginPass" placeholder="ENTER PASSWORD" required>
                <button type="submit" class="action-btn" style="width: 100%;">LOG IN</button>
            </div>
        </form>
        
        <div style="margin-top: 15px; font-size: 0.8rem;">
            <a href="signup.html" style="color: var(--caution-orange); text-decoration: none;">CREATE ACCOUNT</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
